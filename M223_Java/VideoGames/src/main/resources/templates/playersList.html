<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customers</title>
    <link rel="stylesheet" href="/css/styler3.css">
</head>
<body>

<h1>Player list</h1>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Nickname</th>
        <th>Team</th>
        <th>Game</th>
    </tr>
    </thead>
    <tbody>

    <tr th:each="player : ${players}">
        <td th:text="${player.id}"></td>
        <td th:text="${player.nickname}"></td>
        <td th:text="${player.team.name}"></td>
        <td th:text="${player.profile.gameName}"></td>
    </tr>


    </tbody>
</table>

<br>

<h3><a href="http://localhost:8095/h2-console">Show DB</a></h3>
</body>
</html>
