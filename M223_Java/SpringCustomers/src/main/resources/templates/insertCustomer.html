<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>New customer</title>
    <link rel="stylesheet" href="/css/styler3.css">
</head>
<body>
<h1>Add a new customer</h1>

<form method="POST" th:object="${customer}">
    <!--div>
        <label for="id">Id:</label>
        <input type="number" id="id" th:field="${customer.id}"/>
        <span class="validationError" th:if="${#fields.hasErrors('id')}"
              th:errors="${customer.id}">Name Error</span>
    </div-->
    <div>
        <label for="name">Name:</label>
        <input type="text" id="name" th:field="${customer.name}"/>
        <span class="validationError" th:if="${#fields.hasErrors('name')}"
              th:errors="${customer.name}">Name Error</span>

    </div>
    <div>
        <label for="surname">Surname:</label>
        <input type="text" id="surname" th:field="${customer.surname}"/>
        <span class="validationError" th:if="${#fields.hasErrors('surname')}"
              th:errors="${customer.surname}">Name Error</span>
    </div>
    <div>
        <label for="age">Age:</label>
        <input type="number" id="age" th:field="${customer.age}"/>
        <span class="validationError" th:if="${#fields.hasErrors('age')}"
              th:errors="${customer.age}">Name Error</span>
    </div>
    <div>
        <label for="street">Street:</label>
        <input type="text" id="street" th:field="${customer.address.street}"/>
        <span class="validationError" th:if="${#fields.hasErrors('address.street')}"
              th:errors="${customer.address.street}">Name Error</span>
    </div>
    <div>
        <label for="num">Number:</label>
        <input type="text" id="num" th:field="${customer.address.num}"/>
        <span class="validationError" th:if="${#fields.hasErrors('address.num')}"
              th:errors="${customer.address.num}">Name Error</span>
    </div>
    <div>
        <label for="zip">Zip:</label>
        <input type="text" id="zip" th:field="${customer.address.zip}"/>
        <span class="validationError" th:if="${#fields.hasErrors('address.zip')}"
              th:errors="${customer.address.zip}">Name Error</span>
    </div>
    <div>
        <label for="city">City:</label>
        <input type="text" id="city" th:field="${customer.address.city}"/>
        <span class="validationError" th:if="${#fields.hasErrors('address.city')}"
              th:errors="${customer.address.city}">Name Error</span>
    </div>
    <div>
        <label for="nation">Nation:</label>
        <input type="text" id="nation" th:field="${customer.address.nation}"/>
        <span class="validationError" th:if="${#fields.hasErrors('address.nation')}"
              th:errors="${customer.address.nation}">Name Error</span>
    </div>

    <div>
        <button type="submit">Save</button>
    </div>
</form>

<br>

<h3><a href="/customers">Show customer list</a></h3>
<h3><a href="/customers/mealgroups">Show meal groups list</a></h3>
<h3><a href="/h2-console/login.do?jsessionid=66d937b23e18dcac56a4e29e96a0b3ff">Show DB</a></h3>
</body>
</html>
